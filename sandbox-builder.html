<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Immersive Lab: Sandbox - Builder</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:#1a1a1a; --surface:#242424; --surface2:#2e2e2e; --surface3:#383838;
  --border:rgba(255,255,255,0.08); --border-strong:rgba(255,255,255,0.15);
  --text:#f0ede6; --text-muted:#888;
  --blue:#378ADD; --blue-hover:#4a9eff; --blue-dim:#1a3d5c;
  --red:#e55; --green:#4c4; --radius:8px; --panel:280px; --z-modal:100;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;font-size:13px;line-height:1.4;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden;-webkit-font-smoothing:antialiased;}
.topbar{display:flex;align-items:center;gap:10px;padding:8px 16px;background:var(--surface);border-bottom:0.5px solid var(--border);flex-shrink:0;height:42px;}
.topbar h1{font-size:15px;font-weight:700;letter-spacing:-0.01em;white-space:nowrap;}
.topbar-sep{flex:1;}
.main{display:flex;flex:1;overflow:hidden;}
.left-panel{width:var(--panel);flex-shrink:0;background:var(--surface);display:flex;flex-direction:column;overflow-y:auto;overflow-x:hidden;scrollbar-width:none;border-right:0.5px solid var(--border);}
.left-panel::-webkit-scrollbar{display:none;}
.center{flex:1;overflow:hidden;display:flex;flex-direction:column;background:#111;}
.canvas-area{flex:1;overflow:auto;scrollbar-width:thin;scrollbar-color:var(--surface3) transparent;}
.status-bar{height:24px;flex-shrink:0;background:var(--surface);border-top:0.5px solid var(--border);display:flex;align-items:center;gap:16px;padding:0 14px;font-size:10px;color:var(--text-muted);}
.status-bar b{color:var(--text);font-weight:600;}
.panel-section{border-bottom:0.5px solid var(--border);flex-shrink:0;}
.panel-section:last-child{border-bottom:none;}
.section-header{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;cursor:pointer;user-select:none;}
.section-header:hover{background:var(--surface2);}
.section-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-muted);}
.section-chevron{transition:transform 0.2s;color:var(--text-muted);flex-shrink:0;}
.section-header.collapsed .section-chevron{transform:rotate(-90deg);}
.section-body{padding:0 14px 12px;}
.section-body.hidden{display:none;}
.tb-btn{border:0.5px solid var(--border-strong);border-radius:var(--radius);background:var(--surface2);color:var(--text);padding:6px 12px;font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px;white-space:nowrap;transition:background 0.1s;line-height:1;}
.tb-btn:hover{background:var(--surface3);}
.tb-btn.primary{background:var(--blue);border-color:var(--blue);color:#fff;}
.tb-btn.primary:hover{background:var(--blue-hover);}
.big-btn{width:100%;border:none;border-radius:var(--radius);padding:10px;font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;transition:background 0.1s,transform 0.08s;margin-bottom:7px;}
.big-btn:last-child{margin-bottom:0;}
.big-btn:active{transform:scale(0.97);}
.big-btn.primary{background:var(--blue);color:#fff;}
.big-btn.primary:hover{background:var(--blue-hover);}
.big-btn.ghost{background:var(--surface2);color:var(--text);border:0.5px solid var(--border-strong);}
.big-btn.ghost:hover{background:var(--surface3);}
.big-btn.danger{background:transparent;color:var(--red);border:0.5px solid #a33;}
.big-btn.danger:hover{background:#2a1212;}
input[type=text],input[type=url],textarea,select{background:var(--surface2);border:0.5px solid var(--border-strong);border-radius:6px;color:var(--text);padding:6px 9px;font-size:12px;font-family:inherit;width:100%;transition:border-color 0.1s;}
input:focus,textarea:focus,select:focus{outline:none;border-color:var(--blue);}
input::placeholder,textarea::placeholder{color:var(--text-muted);}
textarea{resize:vertical;min-height:60px;line-height:1.5;}
label.field-label{display:block;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.07em;color:var(--text-muted);margin-bottom:4px;}
.field{margin-bottom:10px;}
.field:last-child{margin-bottom:0;}
.pill{font-size:10px;font-weight:700;background:var(--blue-dim);color:var(--blue);border-radius:4px;padding:2px 7px;text-transform:uppercase;letter-spacing:0.06em;display:inline-block;}
.info-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
.info-row .info-label{font-size:11px;color:var(--text-muted);}
.info-row .info-val{font-size:11px;font-weight:600;color:var(--text);}
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:var(--z-modal);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.15s;}
.modal-backdrop.open{opacity:1;pointer-events:all;}
.modal{background:#2b2b2b;border:0.5px solid rgba(0,0,0,0.6);border-radius:6px;width:520px;max-width:96vw;max-height:90vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 32px 100px rgba(0,0,0,0.8);transform:scale(0.97) translateY(8px);transition:transform 0.18s;}
.modal-backdrop.open .modal{transform:scale(1) translateY(0);}
.modal-titlebar{display:flex;align-items:center;justify-content:space-between;padding:0 18px;height:42px;background:#333;border-bottom:1px solid #1a1a1a;flex-shrink:0;}
.modal-titlebar h2{font-size:13px;font-weight:600;color:#ccc;}
.modal-close{background:none;border:none;color:#888;cursor:pointer;font-size:18px;line-height:1;padding:4px 7px;border-radius:3px;}
.modal-close:hover{background:rgba(255,255,255,0.08);color:#eee;}
.modal-body{flex:1;overflow-y:auto;padding:18px;}
.modal-footer{padding:12px 18px;border-top:1px solid #1a1a1a;display:flex;justify-content:flex-end;gap:8px;flex-shrink:0;background:#252525;}
.modal-btn{border-radius:4px;padding:7px 20px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid #555;background:#3a3a3a;color:#ccc;transition:background 0.1s;}
.modal-btn:hover{background:#444;color:#fff;}
.modal-btn.primary{background:var(--blue);border-color:var(--blue);color:#fff;}
.modal-btn.primary:hover{background:var(--blue-hover);}
.modal-btn.danger{background:#3a1212;border-color:#a33;color:var(--red);}
.modal-btn.danger:hover{background:#4a1818;}
.project-list{display:flex;flex-direction:column;gap:6px;padding:0 14px 12px;}
.project-card-item{background:var(--surface2);border:0.5px solid var(--border-strong);border-radius:var(--radius);padding:8px 10px;cursor:pointer;transition:background 0.1s,border-color 0.1s;display:flex;align-items:center;gap:10px;}
.project-card-item:hover{background:var(--surface3);}
.project-card-thumb{width:42px;height:30px;border-radius:4px;background:var(--surface3);flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center;}
.project-card-thumb img{width:100%;height:100%;object-fit:cover;}
.project-card-thumb-placeholder{color:var(--text-muted);font-size:9px;font-weight:700;text-transform:uppercase;}
.project-card-meta{flex:1;min-width:0;}
.project-card-name{font-size:11px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.project-card-tier{font-size:10px;color:var(--text-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cat-chip{font-size:10px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;padding:3px 8px;border-radius:4px;border:0.5px solid var(--border-strong);background:var(--surface2);color:var(--text-muted);cursor:pointer;user-select:none;transition:background 0.1s,border-color 0.1s,color 0.1s;white-space:nowrap;}
.cat-chip:hover{background:var(--surface3);color:var(--text);}
.cat-chip.active{border-color:var(--blue);background:var(--blue-dim);color:var(--blue);}
.thumb-upload-area{border:0.5px dashed var(--border-strong);border-radius:var(--radius);background:var(--surface2);cursor:pointer;transition:border-color 0.15s,background 0.15s;overflow:hidden;}
.thumb-upload-area:hover{border-color:var(--blue);background:var(--surface3);}
.thumb-preview{width:100%;aspect-ratio:16/9;display:flex;align-items:center;justify-content:center;background:#111;overflow:hidden;}
.thumb-preview img{width:100%;height:100%;object-fit:cover;display:block;}
.thumb-preview-empty{color:#444;font-size:10px;text-align:center;padding:12px;}
.thumb-upload-hint{font-size:10px;color:var(--text-muted);text-align:center;padding:8px;}
.guide-sep{height:0.5px;background:var(--border);margin:8px 0;}
#landingPreview{min-height:100%;background:#0d0d0d;}
.lp-root{min-height:100%;background:#0d0d0d;color:#e8e3d8;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;}
.lp-hero{padding:72px 60px 48px;border-bottom:0.5px solid rgba(255,255,255,0.06);position:relative;overflow:hidden;}
.lp-hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 70% 60% at 50% 0%,rgba(55,138,221,0.07) 0%,transparent 70%);pointer-events:none;}
.lp-eyebrow{font-size:10px;font-weight:700;letter-spacing:0.18em;text-transform:uppercase;color:#378ADD;margin-bottom:16px;}
.lp-title{font-size:42px;font-weight:700;letter-spacing:-0.03em;line-height:1.05;color:#f0ede6;margin-bottom:16px;}
.lp-title span{color:#378ADD;}
.lp-subtitle{font-size:14px;line-height:1.65;color:#999;max-width:680px;}
.lp-meta{display:flex;align-items:center;gap:20px;margin-top:28px;}
.lp-tag{font-size:10px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:#888;padding:3px 8px;border:0.5px solid rgba(255,255,255,0.12);border-radius:3px;}
.lp-count{font-size:11px;color:#666;}
.lp-section{padding:36px 60px 60px;}
.lp-section-head{display:flex;align-items:center;gap:12px;margin-bottom:24px;flex-wrap:wrap;}
.lp-section-label{font-size:10px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:#666;white-space:nowrap;}
.lp-section-line{flex:1;height:0.5px;background:rgba(255,255,255,0.06);min-width:20px;}
.lp-sort-chips{display:flex;gap:5px;flex-shrink:0;}
.lp-sort-chip{font-size:10px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;padding:3px 8px;border-radius:4px;border:0.5px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.04);color:#888;}
.lp-sort-chip.active{border-color:#378ADD;background:#1a3d5c;color:#378ADD;}
.lp-tier-group{margin-bottom:40px;}
.lp-tier-head{display:flex;align-items:baseline;gap:10px;margin-bottom:14px;}
.lp-tier-head-label{font-size:10px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:#378ADD;white-space:nowrap;}
.lp-tier-head-line{flex:1;height:0.5px;background:rgba(255,255,255,0.06);}
.lp-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:2px;}
.lp-card{background:#141414;border:2px solid transparent;outline:0.5px solid rgba(255,255,255,0.06);overflow:hidden;display:flex;flex-direction:column;text-decoration:none;color:inherit;position:relative;transition:border-color 0.2s,background 0.2s;}
.lp-card:hover{background:#1c1c1c;border-color:rgba(55,138,221,0.7);}
.lp-card:hover .lp-card-arrow{opacity:1;transform:translate(0,0);}
.lp-card-thumb{aspect-ratio:16/9;background:#111;overflow:hidden;position:relative;}
.lp-card-thumb img{width:100%;height:100%;object-fit:cover;display:block;filter:brightness(0.85) saturate(0.9);transition:filter 0.3s;}
.lp-card:hover .lp-card-thumb img{filter:brightness(1) saturate(1);}
.lp-card-thumb-empty{width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:repeating-conic-gradient(#1a1a1a 0% 25%,#161616 0% 50%);background-size:12px 12px;}
.lp-card-thumb-empty svg{opacity:0.1;}
.lp-card-tier-badge{position:absolute;top:8px;left:8px;font-size:9px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:2px 6px;border-radius:3px;background:rgba(0,0,0,0.7);color:#888;backdrop-filter:blur(4px);}
.lp-card-body{padding:16px 18px 18px;flex:1;display:flex;flex-direction:column;}
.lp-card-num{font-size:10px;color:#666;font-weight:700;letter-spacing:0.06em;margin-bottom:4px;}
.lp-card-name{font-size:14px;font-weight:700;color:#e8e3d8;margin-bottom:8px;letter-spacing:-0.01em;line-height:1.3;}
.lp-card-desc{font-size:14px;color:#999;line-height:1.65;flex:1;margin-bottom:14px;}
.lp-card-footer{display:flex;align-items:center;justify-content:space-between;border-top:0.5px solid rgba(255,255,255,0.05);padding-top:12px;}
.lp-card-tech{display:flex;gap:4px;flex-wrap:wrap;}
.lp-card-tech-tag{font-size:9px;font-weight:700;letter-spacing:0.07em;text-transform:uppercase;color:#666;padding:2px 5px;border:0.5px solid rgba(255,255,255,0.08);border-radius:2px;}
.lp-card-arrow{color:#378ADD;opacity:0;transform:translate(-4px,4px);transition:opacity 0.2s,transform 0.2s;flex-shrink:0;}
.lp-footer{padding:24px 60px;border-top:0.5px solid rgba(255,255,255,0.05);display:flex;align-items:center;justify-content:center;}
.lp-footer-label{font-size:10px;color:#e8e3d8;letter-spacing:0.08em;text-transform:uppercase;}
.lp-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:80px 40px;text-align:center;}
.lp-empty-title{font-size:16px;font-weight:700;color:#888;}
.lp-empty-sub{font-size:12px;color:#888;opacity:0.5;}
.hidden{display:none !important;}
svg{display:block;flex-shrink:0;}
</style>
</head>
<body>

<div class="topbar">
  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#378ADD" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
  <h1>Immersive Lab: Sandbox</h1>
  <div class="pill">Builder</div>
  <div class="topbar-sep"></div>
  <button class="tb-btn" onclick="addProject()">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    Add Project
  </button>
  <button class="tb-btn" onclick="importJSON()">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
    Import JSON
  </button>
  <button class="tb-btn primary" onclick="exportAll()">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
    Export All Projects
  </button>
  <input type="file" id="jsonFileInput" accept=".json" style="display:none" onchange="handleJSONImport(event)">
</div>

<div class="main">
  <div class="left-panel">

    <div class="panel-section">
      <div class="section-header" onclick="toggleSection(this)">
        <div class="section-label">Site Settings</div>
        <svg class="section-chevron" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
      <div class="section-body">
        <div class="field"><label class="field-label">Eyebrow text</label><input type="text" id="siteEyebrow" value="Browser-based creative tools : Chris Shaw" oninput="renderPreview();saveSession()"></div>
        <div class="field"><label class="field-label">Title</label><input type="text" id="siteTitle" value="Immersive Lab" oninput="renderPreview();saveSession()"></div>
        <div class="field"><label class="field-label">Title accent word</label><input type="text" id="siteTitleAccent" value="Sandbox" oninput="renderPreview();saveSession()"></div>
        <div class="field"><label class="field-label">Subtitle</label><textarea id="siteSubtitle" rows="4" oninput="renderPreview();saveSession()">The projects here exist at the intersection of exploration and imagination. A collection of real-time creative experiments using webcam, MediaPipe, and the Web Audio API, built through vibe coding: an intuitive, improvisational approach to making where curiosity leads and outcomes follow. They exist to probe, to test, to ask what if. Because imagination needs space before it needs purpose - and the most interesting discoveries tend to live just past the point where the plan ran out.</textarea></div>
        <div class="field">
          <label class="field-label">List Projects</label>
          <div style="display:flex;flex-wrap:wrap;gap:5px;margin-top:2px;">
            <span class="cat-chip active" id="sortBtnDate" onclick="setSortMode('date')">By Date</span>
            <span class="cat-chip"        id="sortBtnTier" onclick="setSortMode('tier')">By Tier</span>
          </div>
        </div>
      </div>
    </div>

    <div class="panel-section">
      <div class="section-header" onclick="toggleSection(this)">
        <div class="section-label">Projects</div>
        <svg class="section-chevron" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
      <div class="section-body" style="padding:0;">
        <div class="project-list" id="projectList"></div>
        <div style="padding:8px 14px 12px;">
          <button class="big-btn ghost" onclick="addProject()">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Add Project
          </button>
        </div>
      </div>
    </div>

    <div class="panel-section">
      <div class="section-header" onclick="toggleSection(this)">
        <div class="section-label">Stats</div>
        <svg class="section-chevron" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
      <div class="section-body">
        <div class="info-row"><span class="info-label">Total projects</span><span class="info-val" id="statTotal">0</span></div>
        <div class="info-row"><span class="info-label">With thumbnails</span><span class="info-val" id="statThumbs">0</span></div>
        <div class="info-row"><span class="info-label">With links</span><span class="info-val" id="statLinks">0</span></div>
        <div class="guide-sep"></div>
        <button class="big-btn danger" style="font-size:11px;" onclick="resetToDefaults()">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
          Reset to defaults
        </button>
      </div>
    </div>

  </div>

  <div class="center">
    <div class="canvas-area"><div id="landingPreview"></div></div>
  </div>
</div>

<div class="status-bar">
  <span>Mode: <b>Builder</b></span>
  <span id="statusProjects">0 projects</span>
  <div style="flex:1"></div>
  <span id="saveIndicator" style="color:var(--green);opacity:0;transition:opacity 0.4s;font-weight:600;"></span>
  <span style="color:#444">Live preview &middot; click a card to edit &middot; images served from images/ folder</span>
</div>

<div class="modal-backdrop" id="editModal">
  <div class="modal">
    <div class="modal-titlebar">
      <h2 id="editModalTitle">Edit Project</h2>
      <button class="modal-close" onclick="closeModal()">&#x00D7;</button>
    </div>
    <div class="modal-body">
      <div class="field"><label class="field-label">Project Name</label><input type="text" id="editName" placeholder="e.g. Motion Trail Painter"></div>
      <div class="field">
        <label class="field-label">Tier</label>
        <select id="editTier">
          <option value="">- No tier -</option>
          <option value="1">Tier 1</option>
          <option value="2">Tier 2</option>
          <option value="3">Tier 3</option>
          <option value="4">Tier 4</option>
          <option value="5">Tier 5</option>
        </select>
      </div>
      <div class="field"><label class="field-label">Categories</label><div id="editCategories" style="display:flex;flex-wrap:wrap;gap:5px;margin-top:2px;"></div></div>
      <div class="field"><label class="field-label">Description</label><textarea id="editDesc" rows="3" placeholder="What does this project do?"></textarea></div>
      <div class="field"><label class="field-label">Link (URL)</label><input type="url" id="editLink" placeholder="e.g. ./motion-trail-painter/"></div>
      <div class="field"><label class="field-label">Tech Tags (comma-separated)</label><input type="text" id="editTags" placeholder="e.g. WebCam, Canvas API, Hands"></div>
      <div class="field"><label class="field-label">Date</label><input type="date" id="editDate" style="color-scheme:dark;"></div>
      <div class="field">
        <label class="field-label">Thumbnail - place image in images/ folder, then select it here</label>
        <div class="thumb-upload-area" id="thumbUploadArea">
          <input type="file" id="thumbFileInput" accept="image/*" style="display:none" onchange="handleThumbSelect(event)">
          <div class="thumb-preview" id="thumbPreview"><span class="thumb-preview-empty">Click to select image</span></div>
          <div class="thumb-upload-hint">Image must exist in your images/ folder</div>
        </div>
        <div style="margin-top:6px;"><button class="big-btn ghost" style="font-size:11px;" onclick="clearThumb()">Clear thumbnail</button></div>
      </div>

function b64DecodeUtf8(b64){
  var bin=atob(b64);
  var bytes=new Uint8Array(bin.length);
  for(var i=0;i<bin.length;i++){bytes[i]=bin.charCodeAt(i);}
  return new TextDecoder('utf-8').decode(bytes);
}

/* Session */
var SS_KEY='immersive-lab-v1';
function saveSession(){
  try{ sessionStorage.setItem(SS_KEY,JSON.stringify({projects:projects,nextId:nextId,sortMode:sortMode,site:getSite()})); showSaved(); }catch(e){}
}
function loadSession(){
  try{
    var raw=sessionStorage.getItem(SS_KEY); if(!raw)return false;
    var d=JSON.parse(raw);
    if(d.projects)projects=d.projects; if(d.nextId)nextId=d.nextId;
    if(d.sortMode)sortMode=d.sortMode; if(d.site)applySite(d.site);
    return true;
  }catch(e){return false;}
}
function getSite(){
  return{eyebrow:document.getElementById('siteEyebrow').value,title:document.getElementById('siteTitle').value,accent:document.getElementById('siteTitleAccent').value,subtitle:document.getElementById('siteSubtitle').value};
}
function applySite(s){
  if(s.eyebrow!=null)document.getElementById('siteEyebrow').value=s.eyebrow;
  if(s.title!=null)document.getElementById('siteTitle').value=s.title;
  if(s.accent!=null)document.getElementById('siteTitleAccent').value=s.accent;
  if(s.subtitle!=null)document.getElementById('siteSubtitle').value=s.subtitle;
}
var _st=null;
function showSaved(msg){
  msg=msg||'Saved';
  var el=document.getElementById('saveIndicator');
  el.textContent=msg;el.style.opacity='1';
  clearTimeout(_st);_st=setTimeout(function(){el.style.opacity='0';},2000);
}

/* Import JSON */
function importJSON(){document.getElementById('jsonFileInput').click();}
function handleJSONImport(e){
  var file=e.target.files[0]; if(!file)return;
  var r=new FileReader();
  r.onload=function(ev){
    try{
      var d=JSON.parse(ev.target.result);
      if(d.projects)projects=d.projects; if(d.nextId)nextId=d.nextId;
      if(d.sortMode)sortMode=d.sortMode; if(d.site)applySite(d.site);
      syncSortButtons();renderList();renderPreview();saveSession();showSaved('JSON imported');
    }catch(err){alert('Invalid JSON file.');}
  };
  r.readAsText(file);e.target.value='';
}

/* Export All */
function downloadBlob(content,filename,type){
  var blob=new Blob([content],{type:type});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');a.href=url;a.download=filename;a.click();
  URL.revokeObjectURL(url);
}
function exportAll(){
  downloadBlob(JSON.stringify({projects:projects,nextId:nextId,sortMode:sortMode,site:getSite()},null,2),'projects.json','application/json');
  setTimeout(function(){downloadBlob(buildIndexHTML(),'index.html','text/html');showSaved('Exported projects.json + index.html');},300);
}
function resetToDefaults(){
  if(!confirm('Reset all data to defaults?'))return;
  sessionStorage.removeItem(SS_KEY);location.reload();
}

/* Build index.html from the base64 shell template.
   The shell contains the complete page; we only substitute
   the site-setting placeholders. This builder JS contains no
   literal HTML document tags, so dev servers that inject
   reload scripts (e.g. Live Server searching for a body close
   tag) cannot corrupt this file. */
function buildIndexHTML(){
  var s=getSite();
  return b64DecodeUtf8(INDEX_SHELL_B64)
    .split('{{EYEBROW}}').join(s.eyebrow)
    .split('{{TITLE}}').join(s.title)
    .split('{{ACCENT}}').join(s.accent)
    .split('{{SUBTITLE}}').join(s.subtitle)
    .split('{{YEAR}}').join(String(new Date().getFullYear()));
}

/* Sort */
function setSortMode(mode){sortMode=mode;syncSortButtons();renderPreview();saveSession();}
function syncSortButtons(){
  document.getElementById('sortBtnDate').classList.toggle('active',sortMode==='date');
  document.getElementById('sortBtnTier').classList.toggle('active',sortMode==='tier');
}
function toggleSection(h){
  h.classList.toggle('collapsed');
  var b=h.nextElementSibling;if(b&&b.classList.contains('section-body'))b.classList.toggle('hidden');
}

/* Date */
function fmtDate(iso){if(!iso)return'';var p=iso.split('-');return p[2]+'/'+p[1]+'/'+p[0].slice(2);}

/* Render sidebar list */
function renderList(){
  var list=document.getElementById('projectList');list.innerHTML='';
  projects.forEach(function(p,i){
    var item=document.createElement('div');item.className='project-card-item';
    item.addEventListener('click',function(){openEdit(p.id);});
    var thumbHTML=p.thumb
      ?'<img src="'+p.thumb+'" alt="">'
      :'<div class="project-card-thumb-placeholder">'+String(i+1).padStart(2,'0')+'</div>';
    item.innerHTML='<div class="project-card-thumb">'+thumbHTML+'</div>'
      +'<div class="project-card-meta">'
      +'<div class="project-card-name">'+(p.name||'Untitled')+'</div>'
      +'<div class="project-card-tier">'+(p.tier?'Tier '+p.tier:'No tier')
      +(p.categories&&p.categories.length?' - '+p.categories.slice(0,2).join(', '):'')
      +(p.date?' - '+fmtDate(p.date):'')+'</div></div>';
    list.appendChild(item);
  });
  document.getElementById('statTotal').textContent=projects.length;
  document.getElementById('statThumbs').textContent=projects.filter(function(p){return p.thumb;}).length;
  document.getElementById('statLinks').textContent=projects.filter(function(p){return p.link;}).length;
  document.getElementById('statusProjects').textContent=projects.length+' project'+(projects.length!==1?'s':'');
}

/* Build preview card */
function buildPreviewCard(p,num){
  var cats=(p.categories||[]).map(function(t){return'<span class="lp-card-tech-tag">'+t+'</span>';}).join('');
  var thumb=p.thumb
    ?'<img src="'+p.thumb+'" alt="'+(p.name||'')+'">'
    :'<div class="lp-card-thumb-empty"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/></svg></div>';
  var badge=p.tier?'<div class="lp-card-tier-badge">Tier '+p.tier+'</div>':'';
  var dl=p.date?' \u00b7 '+fmtDate(p.date):'';
  var href=p.link?'href="'+p.link+'" target="_blank"':'';
  return'<a class="lp-card" '+href+'><div class="lp-card-thumb">'+thumb+badge+'</div>'
    +'<div class="lp-card-body"><div class="lp-card-num">'+num+dl+'</div>'
    +'<div class="lp-card-name">'+(p.name||'Untitled')+'</div>'
    +'<div class="lp-card-desc">'+(p.desc||'No description yet.')+'</div>'
    +'<div class="lp-card-footer"><div class="lp-card-tech">'+cats+'</div>'
    +'<svg class="lp-card-arrow" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m7 17 10-10M7 7h10v10"/></svg>'
    +'</div></div></a>';
}
function buildGrid(list){return'<div class="lp-grid">'+list.map(function(p,i){return buildPreviewCard(p,String(i+1).padStart(2,'0'));}).join('')+'</div>';}

/* Render preview */
function renderPreview(){
  var s=getSite();var content='';
  if(!projects.length){
    content='<div class="lp-empty"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.5" style="opacity:.1"><rect x="3" y="3" width="18" height="18" rx="2"/></svg><div class="lp-empty-title">No projects yet</div><div class="lp-empty-sub">Add a project using the panel on the left</div></div>';
  } else if(sortMode==='date'){
    var sorted=projects.slice().sort(function(a,b){return!a.date&&!b.date?0:!a.date?1:!b.date?-1:b.date.localeCompare(a.date);});
    content=buildGrid(sorted);
  } else {
    ['1','2','3','4','5'].forEach(function(t){
      var l=projects.filter(function(p){return p.tier===t;});
      if(l.length)content+='<div class="lp-tier-group"><div class="lp-tier-head"><span class="lp-tier-head-label">Tier '+t+'</span><div class="lp-tier-head-line"></div></div>'+buildGrid(l)+'</div>';
    });
    var u=projects.filter(function(p){return!p.tier;});
    if(u.length)content+='<div class="lp-tier-group"><div class="lp-tier-head"><span class="lp-tier-head-label">Untiered</span><div class="lp-tier-head-line"></div></div>'+buildGrid(u)+'</div>';
  }
  var chips='<span class="lp-sort-chip'+(sortMode==='date'?' active':'')+'">By Date</span><span class="lp-sort-chip'+(sortMode==='tier'?' active':'')+'">By Tier</span>';
  document.getElementById('landingPreview').innerHTML=
    '<div class="lp-root"><div class="lp-hero">'
    +'<div class="lp-eyebrow">'+s.eyebrow+'</div>'
    +'<div class="lp-title">'+s.title+' <span>'+s.accent+'</span></div>'
    +'<div class="lp-subtitle">'+s.subtitle+'</div>'
    +'<div class="lp-meta"><div class="lp-tag">WebCam</div><div class="lp-tag">MediaPipe</div><div class="lp-tag">Web Audio</div>'
    +'<div class="lp-count">'+projects.length+' experiment'+(projects.length!==1?'s':'')+'</div></div></div>'
    +'<div class="lp-section"><div class="lp-section-head"><span class="lp-section-label">List Projects</span><div class="lp-sort-chips">'+chips+'</div><div class="lp-section-line"></div></div>'+content+'</div>'
    +'<div class="lp-footer"><span class="lp-footer-label">Immersive Lab \u00b7 Sandbox \u00a0\u00b7\u00a0 \u00a9 Chris Shaw '+new Date().getFullYear()+'</span></div></div>';
}

/* Add / Edit / Delete */
function addProject(){
  var p={id:nextId++,name:'',tier:'',categories:[],date:'',desc:'',link:'',tags:[],thumb:''};
  projects.push(p);renderList();renderPreview();saveSession();openEdit(p.id);
}
function buildCategoryChips(selected){
  var wrap=document.getElementById('editCategories');wrap.innerHTML='';
  CATEGORIES.forEach(function(cat){
    var chip=document.createElement('span');
    chip.className='cat-chip'+(selected.indexOf(cat)>=0?' active':'');
    chip.textContent=cat;
    chip.addEventListener('click',function(){chip.classList.toggle('active');});
    wrap.appendChild(chip);
  });
}
function getSelectedCategories(){
  return Array.prototype.map.call(document.querySelectorAll('#editCategories .cat-chip.active'),function(c){return c.textContent;});
}
function openEdit(id){
  var p=null;for(var i=0;i<projects.length;i++){if(projects[i].id===id){p=projects[i];break;}}
  if(!p)return;
  editingId=id;editThumbPath=p.thumb||'';editThumbObjectURL='';
  document.getElementById('editModalTitle').textContent=p.name||'New Project';
  document.getElementById('editName').value=p.name||'';
  document.getElementById('editTier').value=p.tier||'';
  document.getElementById('editDesc').value=p.desc||'';
  document.getElementById('editLink').value=p.link||'';
  document.getElementById('editTags').value=(p.tags||[]).join(', ');
  document.getElementById('editDate').value=p.date||'';
  buildCategoryChips(p.categories||[]);
  var preview=document.getElementById('thumbPreview');
  if(p.thumb){
    var img=document.createElement('img');
    img.src=p.thumb;img.alt='';
    img.onerror=function(){preview.innerHTML='<span class="thumb-preview-empty">Image not found - check images/ folder</span>';};
    preview.innerHTML='';preview.appendChild(img);
  } else {
    preview.innerHTML='<span class="thumb-preview-empty">Click to select image from images/ folder</span>';
  }
  document.getElementById('editModal').classList.add('open');
}
function closeModal(){
  document.getElementById('editModal').classList.remove('open');
  if(editThumbObjectURL){URL.revokeObjectURL(editThumbObjectURL);editThumbObjectURL='';}
  editingId=null;editThumbPath='';
}
function saveProject(){
  if(editingId===null)return;
  var p=null;for(var i=0;i<projects.length;i++){if(projects[i].id===editingId){p=projects[i];break;}}
  if(!p)return;
  p.name=document.getElementById('editName').value.trim();
  p.tier=document.getElementById('editTier').value;
  p.categories=getSelectedCategories();
  p.date=document.getElementById('editDate').value;
  p.desc=document.getElementById('editDesc').value.trim();
  p.link=document.getElementById('editLink').value.trim();
  p.tags=document.getElementById('editTags').value.split(',').map(function(t){return t.trim();}).filter(Boolean);
  p.thumb=editThumbPath;
  closeModal();renderList();renderPreview();saveSession();
}
function deleteCurrentProject(){
  if(editingId===null)return;
  if(!confirm('Delete this project?'))return;
  projects=projects.filter(function(p){return p.id!==editingId;});
  closeModal();renderList();renderPreview();saveSession();
}

/* Thumbnail */
function handleThumbSelect(e){
  var file=e.target.files[0];if(!file)return;
  editThumbPath=IMAGES_FOLDER+file.name;
  if(editThumbObjectURL)URL.revokeObjectURL(editThumbObjectURL);
  editThumbObjectURL=URL.createObjectURL(file);
  var preview=document.getElementById('thumbPreview');
  var img=document.createElement('img');img.src=editThumbObjectURL;img.alt='';
  preview.innerHTML='';preview.appendChild(img);
  e.target.value='';
}
function clearThumb(){
  editThumbPath='';
  if(editThumbObjectURL){URL.revokeObjectURL(editThumbObjectURL);editThumbObjectURL='';}
  document.getElementById('thumbPreview').innerHTML='<span class="thumb-preview-empty">Click to select image from images/ folder</span>';
}

/* Wire up click targets */
document.getElementById('thumbUploadArea').addEventListener('click',function(){
  document.getElementById('thumbFileInput').click();
});
document.getElementById('editModal').addEventListener('click',function(e){
  if(e.target===document.getElementById('editModal'))closeModal();
});

/* Auto-load projects.json */
function tryLoadProjectsJSON(){
  fetch('projects.json')
    .then(function(r){if(!r.ok)throw 0;return r.json();})
    .then(function(d){
      if(d.projects)projects=d.projects;if(d.nextId)nextId=d.nextId;
      if(d.sortMode)sortMode=d.sortMode;if(d.site)applySite(d.site);
      syncSortButtons();renderList();renderPreview();showSaved('Loaded projects.json');
    })
    .catch(function(){
      loadSession();syncSortButtons();renderList();renderPreview();
    });
}
tryLoadProjectsJSON();

</script>
