<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Project</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:         #0e0e0f;
    --panel:      #161618;
    --border:     rgba(255,255,255,0.07);
    --text:       #e8e8e6;
    --muted:      #9b9b97;
    --accent:     #378ADD;
    --accent-dim: rgba(55,138,221,0.12);
    --panel-w:    280px;
  }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: var(--bg);
    font-family: 'DM Sans', sans-serif;
    color: var(--text);
  }

  /* ── TITLE BAR ── */
  #titleBar {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 68px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
    z-index: 200;
    flex-shrink: 0;
  }
  #titleBar img.logo {
    width: 36px;
    height: 36px;
    display: block;
    flex-shrink: 0;
  }
  #titleBar h1 {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    font-weight: 700;
    font-size: 42px;
    letter-spacing: -0.03em;
    line-height: 1.05;
    color: #f0ede6;
    display: flex;
    align-items: baseline;
    gap: 0.22em;
  }
  #titleBar h1 span {
    color: #378ADD;
  }

  /* ── APP SHELL ── */
  #app {
    position: fixed;
    top: 68px; left: 0; right: 0; bottom: 0;
    display: flex;
  }

  /* ── VIEWPORT ── */
  #viewport {
    flex: 1;
    position: relative;
    overflow: hidden;
  }
  #threeCanvas {
    display: block;
    width: 100%; height: 100%;
  }
  #instructions {
    position: absolute;
    bottom: 14px; left: 16px;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    font-weight: 300;
    color: #000000;
    letter-spacing: 0.06em;
    pointer-events: none;
    user-select: none;
  }
  #fpsCounter {
    position: absolute;
    bottom: 14px; right: 16px;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    font-weight: 300;
    color: rgba(255,255,255,0.22);
    letter-spacing: 0.06em;
    pointer-events: none;
    user-select: none;
  }

  /* ── PANEL ── */
  #panel {
    width: var(--panel-w);
    height: 100%;
    background: var(--panel);
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    flex-shrink: 0;
  }
  #panelScroll {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 18px 0 32px;
  }
  #panelScroll::-webkit-scrollbar { width: 3px; }
  #panelScroll::-webkit-scrollbar-track { background: transparent; }
  #panelScroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* ── SECTION / ACCORDION ── */
  .section {
    margin: 0 14px 6px;
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
  }
  .section-header {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    font-weight: 400;
    letter-spacing: 0.12em;
    color: #ffffff;
    text-transform: uppercase;
    padding: 11px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
    user-select: none;
    background: rgba(255,255,255,0.03);
    transition: background 0.15s;
  }
  .section-header:hover { background: rgba(255,255,255,0.06); }
  .section-chevron {
    width: 14px; height: 14px;
    flex-shrink: 0;
    opacity: 0.4;
    transition: transform 0.22s ease;
  }
  .section.open .section-chevron { transform: rotate(180deg); }
  .section-body {
    overflow: hidden;
    max-height: 0;
    transition: max-height 0.28s ease;
  }
  .section.open .section-body { max-height: 800px; }
  .section-inner {
    padding: 4px 14px 10px;
  }

  /* ── ROW ── */
  .row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
    gap: 10px;
    min-height: 38px;
  }
  .row:last-child { border-bottom: none; }
  .row-label {
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 400;
    color: var(--muted);
    white-space: nowrap;
    flex-shrink: 0;
    min-width: 78px;
  }

  /* ── CTA / RESET BUTTON ── */
  .btn-reset {
    display: block;
    width: 100%;
    margin: 10px 0 4px;
    padding: 9px 0;
    background: transparent;
    border: 1px solid rgba(255,255,255,0.18);
    border-radius: 6px;
    color: #ffffff;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    font-weight: 400;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
  }
  .btn-reset:hover {
    background: rgba(255,255,255,0.08);
    border-color: rgba(255,255,255,0.32);
  }
  .btn-reset:active {
    background: rgba(255,255,255,0.12);
  }

  /* ── SLIDER ── */
  .slider-wrap {
    display: flex;
    align-items: center;
    gap: 8px;
    flex: 1;
    min-width: 0;
  }
  input[type=range] {
    -webkit-appearance: none;
    appearance: none;
    flex: 1;
    min-width: 0;
    height: 2px;
    background: #9b9b97;
    border-radius: 2px;
    outline: none;
    cursor: pointer;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
    transition: transform 0.12s;
  }
  input[type=range]::-webkit-slider-thumb:hover {
    transform: scale(1.3);
  }
  input[type=range]::-moz-range-thumb {
    width: 12px; height: 12px;
    border-radius: 50%;
    background: var(--accent);
    border: none;
    cursor: pointer;
  }
  .val {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    font-weight: 300;
    color: var(--muted);
    min-width: 36px;
    text-align: right;
    flex-shrink: 0;
  }

  /* ── TOGGLE SWITCH ── */
  .switch-wrap {
    display: inline-flex;
    align-items: center;
    cursor: pointer;
    flex-shrink: 0;
    position: relative;
  }
  .switch-wrap input[type=checkbox] {
    position: absolute;
    opacity: 0;
    width: 0; height: 0;
    pointer-events: none;
  }
  .switch-track {
    width: 34px;
    height: 18px;
    border-radius: 18px;
    background: var(--border);
    border: 1px solid rgba(255,255,255,0.08);
    position: relative;
    transition: background 0.2s, border-color 0.2s;
    flex-shrink: 0;
  }
  .switch-thumb {
    position: absolute;
    top: 3px; left: 3px;
    width: 12px; height: 12px;
    border-radius: 50%;
    background: var(--muted);
    transition: transform 0.2s, background 0.2s;
    pointer-events: none;
  }
  .switch-wrap input:checked ~ .switch-track {
    background: rgba(55,138,221,0.35);
    border-color: rgba(55,138,221,0.2);
  }
  .switch-wrap input:checked ~ .switch-track .switch-thumb {
    background: var(--accent);
    transform: translateX(16px);
  }
</style>
</head>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ── CUSTOM GRID ───────────────────────────────────────────
function makeGrid(size, divisions, colorMain, colorDiv) {
  const step = size / divisions;
  const half = size / 2;
  const positions = [];
  const colors    = [];

  const cMain = new THREE.Color(colorMain);
  const cDiv  = new THREE.Color(colorDiv);

  for (let i = 0, k = -half; i <= divisions; i++, k += step) {
    const isCenter = (i === divisions / 2);
    const col = isCenter ? cMain : cDiv;
    positions.push(-half, 0, k,  half, 0, k);
    positions.push(k, 0, -half,  k, 0,  half);
    for (let j = 0; j < 4; j++) { colors.push(col.r, col.g, col.b); }
  }

  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
  geo.setAttribute('color',    new THREE.Float32BufferAttribute(colors,    3));
  const mat = new THREE.LineBasicMaterial({ vertexColors: true });
  return new THREE.LineSegments(geo, mat);
}

// ── RENDERER ─────────────────────────────────────────────
const canvas   = document.getElementById('threeCanvas');
const viewport = document.getElementById('viewport');

const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled   = true;
renderer.shadowMap.type      = THREE.PCFSoftShadowMap;
renderer.toneMapping         = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
renderer.autoClear           = false;

// ── MAIN SCENE ───────────────────────────────────────────
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x808080);

// ── CAMERA ───────────────────────────────────────────────
const DEFAULT_FOV    = 45;
const DEFAULT_POS    = new THREE.Vector3(6, 4, 8);
const DEFAULT_TARGET = new THREE.Vector3(0, 0, 0);

const camera = new THREE.PerspectiveCamera(DEFAULT_FOV, 1, 0.01, 1000);
camera.position.copy(DEFAULT_POS);

// ── ORBIT CONTROLS ───────────────────────────────────────
const controls = new OrbitControls(camera, canvas);
controls.enableDamping   = true;
controls.dampingFactor   = 0.08;
controls.autoRotate      = false;
controls.autoRotateSpeed = 1.0;
controls.mouseButtons    = {
  LEFT:   THREE.MOUSE.ROTATE,
  MIDDLE: THREE.MOUSE.DOLLY,
  RIGHT:  THREE.MOUSE.PAN,
};
controls.target.copy(DEFAULT_TARGET);
controls.update();

// ── GRID ─────────────────────────────────────────────────
const grid = makeGrid(20, 40, 0x555555, 0x383838);
scene.add(grid);

// ── GROUND ───────────────────────────────────────────────
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(40, 40),
  new THREE.ShadowMaterial({ opacity: 0.35 })
);
ground.rotation.x    = -Math.PI / 2;
ground.receiveShadow = true;
scene.add(ground);

// ── LIGHTS ───────────────────────────────────────────────
const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambientLight);

// Key Light — (15, 24, 1)
const keyLight = new THREE.DirectionalLight(0xfff5e0, 1.5);
keyLight.position.set(15, 24, 1);
keyLight.castShadow = true;
keyLight.shadow.mapSize.set(2048, 2048);
keyLight.shadow.camera.near   = 0.1;
keyLight.shadow.camera.far    = 80;
keyLight.shadow.camera.left   = -20;
keyLight.shadow.camera.right  =  20;
keyLight.shadow.camera.top    =  20;
keyLight.shadow.camera.bottom = -20;
keyLight.shadow.bias          = -0.001;
scene.add(keyLight);

// Fill Light — (-15, 7, -15)
const fillLight = new THREE.DirectionalLight(0xd0e8ff, 0.6);
fillLight.position.set(-15, 7, -15);
scene.add(fillLight);

// Light helpers — hidden by default
const keyHelper  = new THREE.DirectionalLightHelper(keyLight,  1.2, 0xffff00);
const fillHelper = new THREE.DirectionalLightHelper(fillLight, 1.2, 0x88aaff);
keyHelper.visible  = false;
fillHelper.visible = false;
scene.add(keyHelper);
scene.add(fillHelper);

// ── GIZMO SCENE ──────────────────────────────────────────
const gizmoScene  = new THREE.Scene();
const GIZMO_SIZE  = 88;
const gizmoCamera = new THREE.PerspectiveCamera(50, 1, 0.1, 100);
gizmoCamera.position.set(0, 0, 3);

const AXES = [
  { dir: new THREE.Vector3(1, 0, 0), color: 0xff3333, label: 'X', lc: '#000000' },
  { dir: new THREE.Vector3(0, 1, 0), color: 0x33dd55, label: 'Y', lc: '#000000' },
  { dir: new THREE.Vector3(0, 0, 1), color: 0x3366ff, label: 'Z', lc: '#000000' },
];

AXES.forEach(({ dir, color, label, lc }) => {
  const mat = new THREE.MeshBasicMaterial({ color, depthTest: false });
  const up  = new THREE.Vector3(0, 1, 0);

  const shaft = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.04, 0.72, 8), mat);
  shaft.position.copy(dir.clone().multiplyScalar(0.40));
  shaft.quaternion.setFromUnitVectors(up, dir);
  shaft.renderOrder = 999;
  gizmoScene.add(shaft);

  const cone = new THREE.Mesh(new THREE.ConeGeometry(0.10, 0.22, 12), mat);
  cone.position.copy(dir.clone().multiplyScalar(0.84));
  cone.quaternion.setFromUnitVectors(up, dir);
  cone.renderOrder = 999;
  gizmoScene.add(cone);

  const cv  = document.createElement('canvas');
  cv.width  = 128; cv.height = 128;
  const ctx = cv.getContext('2d');
  ctx.font         = 'bold 72px DM Mono, monospace';
  ctx.fillStyle    = lc;
  ctx.textAlign    = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(label, 64, 64);
  const sprite = new THREE.Sprite(
    new THREE.SpriteMaterial({
      map: new THREE.CanvasTexture(cv),
      depthTest: false,
      transparent: true
    })
  );
  sprite.scale.set(0.36, 0.36, 0.36);
  sprite.position.copy(dir.clone().multiplyScalar(1.18));
  sprite.renderOrder = 1000;
  gizmoScene.add(sprite);
});

// ── RESIZE ───────────────────────────────────────────────
function onResize() {
  const w = viewport.clientWidth;
  const h = viewport.clientHeight;
  renderer.setSize(w, h);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
}
window.addEventListener('resize', onResize);
onResize();

// ── FPS ──────────────────────────────────────────────────
const fpsEl   = document.getElementById('fpsCounter');
let fpsFrames = 0;
let fpsLast   = performance.now();
let showGizmo = true;

// ── RENDER LOOP ──────────────────────────────────────────
function animate() {
  requestAnimationFrame(animate);
  controls.update();

  // Sync gizmo camera to main camera orientation
  gizmoCamera.position
    .copy(camera.position)
    .sub(controls.target)
    .normalize()
    .multiplyScalar(3);
  gizmoCamera.lookAt(0, 0, 0);
  gizmoCamera.up.copy(camera.up);

  keyHelper.update();
  fillHelper.update();

  const vw = viewport.clientWidth;
  const vh = viewport.clientHeight;

  // Main scene
  renderer.setViewport(0, 0, vw, vh);
  renderer.setScissor(0, 0, vw, vh);
  renderer.setScissorTest(true);
  renderer.clear();
  renderer.render(scene, camera);

  // Gizmo — top-right corner
  // WebGL origin is bottom-left, so top-right = (vw - size - m, vh - size - m)
  if (showGizmo) {
    const m  = 14;
    const gx = vw - GIZMO_SIZE - m;
    const gy = vh - GIZMO_SIZE - m;
    renderer.setViewport(gx, gy, GIZMO_SIZE, GIZMO_SIZE);
    renderer.setScissor(gx, gy, GIZMO_SIZE, GIZMO_SIZE);
    renderer.clearDepth();
    renderer.render(gizmoScene, gizmoCamera);
  }

  // FPS
  fpsFrames++;
  const now = performance.now();
  if (now - fpsLast >= 500) {
    fpsEl.textContent = Math.round(fpsFrames * 1000 / (now - fpsLast)) + ' fps';
    fpsFrames = 0;
    fpsLast   = now;
  }
}
animate();

// ── UI HELPERS ───────────────────────────────────────────
function bindSlider(id, valId, decimals, suffix, cb) {
  const sl = document.getElementById(id);
  const vl = document.getElementById(valId);
  sl.addEventListener('input', () => {
    const v = parseFloat(sl.value);
    vl.textContent = v.toFixed(decimals) + (suffix || '');
    cb(v);
  });
}

function bindToggle(id, cb) {
  const el = document.getElementById(id);
  el.addEventListener('change', () => cb(el.checked));
}

## CUSTOM GRID FUNCTION

Use this exact function — do not use THREE.GridHelper:

\`\`\`javascript
function makeGrid(size, divisions, colorMain, colorDiv) {
  const step = size / divisions;
  const half = size / 2;
  const positions = [];
  const colors = [];
  const cMain = new THREE.Color(colorMain);
  const cDiv  = new THREE.Color(colorDiv);
  for (let i = 0, k = -half; i <= divisions; i++, k += step) {
    const isCenter = (i === divisions / 2);
    const col = isCenter ? cMain : cDiv;
    positions.push(-half, 0, k,  half, 0, k);
    positions.push(k, 0, -half,  k, 0,  half);
    for (let j = 0; j < 4; j++) { colors.push(col.r, col.g, col.b); }
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
  geo.setAttribute('color',    new THREE.Float32BufferAttribute(colors, 3));
  const mat = new THREE.LineBasicMaterial({ vertexColors: true });
  return new THREE.LineSegments(geo, mat);
}
\`\`\`
